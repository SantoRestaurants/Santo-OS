name: Download and Analyze Forecast
on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx openpyxl

      - name: Download and analyze
        env:
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          GOOGLE_DRIVE_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}
        run: |
          python -c "
          import httpx, os, json, io
          from openpyxl import load_workbook

          # Get Drive token
          token_resp = httpx.post('https://oauth2.googleapis.com/token', data={
              'client_id': os.environ['GOOGLE_DRIVE_CLIENT_ID'],
              'client_secret': os.environ['GOOGLE_DRIVE_CLIENT_SECRET'],
              'refresh_token': os.environ['GOOGLE_DRIVE_REFRESH_TOKEN'],
              'grant_type': 'refresh_token',
          }, timeout=15)
          access_token = token_resp.json()['access_token']
          headers = {'Authorization': 'Bearer ' + access_token}

          # List files in root folder
          root_folder = '1AlsIIhkRzW-fGM0RQpHLB71r6vcVPXrq'
          resp = httpx.get(
              'https://www.googleapis.com/drive/v3/files',
              params={'q': \"'\" + root_folder + \"' in parents\", 'fields': 'files(id,name,mimeType)'},
              headers=headers,
              timeout=15,
          )
          files = resp.json().get('files', [])
          print('Files in root folder:')
          for f in files:
              print('  ' + f['name'] + ' (' + f['id'] + ')')

          # Find Forecast workbook
          forecast_file = None
          for f in files:
              if 'FC' in f['name'].upper() or 'FORECAST' in f['name'].upper():
                  forecast_file = f
                  break

          if not forecast_file:
              print('ERROR: Forecast workbook not found')
              exit(1)

          print('\nDownloading: ' + forecast_file['name'])
          resp = httpx.get(
              'https://www.googleapis.com/drive/v3/files/' + forecast_file['id'],
              params={'alt': 'media'},
              headers=headers,
              timeout=30,
          )
          wb = load_workbook(io.BytesIO(resp.content), data_only=True)

          # Analyze each sheet
          for sheet_name in wb.sheetnames:
              ws = wb[sheet_name]
              print('\n=== Sheet: ' + sheet_name + ' ===')
              print('Dimensions: ' + str(ws.dimensions))
              print('Max row: ' + str(ws.max_row))
              print('Max col: ' + str(ws.max_column))

              # Print first 30 rows
              print('\nFirst 30 rows:')
              for row_idx, row in enumerate(ws.iter_rows(min_row=1, max_row=min(30, ws.max_row), values_only=False), 1):
                  values = []
                  for cell in row:
                      v = cell.value
                      if v is not None:
                          values.append(str(cell.coordinate) + '=' + str(v)[:30])
                  if values:
                      print('  Row ' + str(row_idx) + ': ' + ', '.join(values[:8]))

          wb.close()
          print('\nDone!')
          "
