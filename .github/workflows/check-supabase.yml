name: Check Supabase Data
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install httpx
      - name: Check data
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -c "
          import httpx, os, json

          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_ROLE_KEY']

          resp = httpx.get(
              f'{url}/rest/v1/workflow_runs',
              params={
                  'select': 'id,business_date,status,output_payload',
                  'source_channel': 'eq.agent_mail',
                  'order': 'created_at.desc',
                  'limit': '5',
              },
              headers={'apikey': key, 'Authorization': f'Bearer {key}'},
              timeout=15,
          )

          data = resp.json()
          if not isinstance(data, list):
              print('Error:', data)
              exit(1)

          print(f'Found {len(data)} workflow_runs')
          for run in data:
              print(f\"\n=== {run['business_date']} ({run['id'][:8]}...) ===\")
              print(f\"Status: {run['status']}\")
              payload = run.get('output_payload', {})
              has_rev = 'revision_document' in payload and payload['revision_document'] is not None
              print(f'Has revision_document: {has_rev}')
              if has_rev:
                  rev = payload['revision_document']
                  print(f\"  unidad: {rev.get('unidad')}\")
                  print(f\"  vta_por_dia rows: {len(rev.get('vta_por_dia', []))}\")
                  print(f\"  formato_corte: {rev.get('formato_corte')}\")
              else:
                  print(f'  payload keys: {list(payload.keys())}')
          "
