name: Analyze CXC Full
on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install httpx openpyxl
      - name: Analyze
        env:
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          GOOGLE_DRIVE_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}
        run: |
          python -c "
          import httpx, os, json, io
          from openpyxl import load_workbook

          token_resp = httpx.post('https://oauth2.googleapis.com/token', data={
              'client_id': os.environ['GOOGLE_DRIVE_CLIENT_ID'],
              'client_secret': os.environ['GOOGLE_DRIVE_CLIENT_SECRET'],
              'refresh_token': os.environ['GOOGLE_DRIVE_REFRESH_TOKEN'],
              'grant_type': 'refresh_token',
          }, timeout=15)
          access_token = token_resp.json()['access_token']
          headers = {'Authorization': 'Bearer ' + access_token}

          file_id = '1mC_WuYqI-eAugkRYbohqbvUSNhYa5BSc'
          resp = httpx.get(
              'https://www.googleapis.com/drive/v3/files/' + file_id,
              params={'alt': 'media'},
              headers=headers,
              timeout=30,
          )

          wb = load_workbook(io.BytesIO(resp.content), data_only=True)
          ws = wb.active

          print('=== HEADERS ===')
          for row_idx in range(1, 5):
              for col_idx in range(1, 25):
                  cell = ws.cell(row=row_idx, column=col_idx)
                  if cell.value is not None:
                      print('  ' + str(cell.coordinate) + '=' + str(cell.value))

          print('\n=== JUNE 17 (Row 21) ===')
          for col_idx in range(1, 25):
              cell = ws.cell(row=21, column=col_idx)
              if cell.value is not None:
                  print('  ' + str(cell.coordinate) + '=' + str(cell.value))

          print('\n=== JUNE 7 (Row 11) ===')
          for col_idx in range(1, 25):
              cell = ws.cell(row=11, column=col_idx)
              if cell.value is not None:
                  print('  ' + str(cell.coordinate) + '=' + str(cell.value))

          wb.close()
          "
