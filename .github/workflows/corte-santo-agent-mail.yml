name: Corte Santo — Agent Mail

on:
  schedule:
    # Every 4 hours. Idempotency prevents re-processing same daily Corte.
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      after:
        description: "ISO timestamp for AgentMail after filter (default: 15 min ago)"
        required: false
        default: ""
      force_reprocess:
        description: "Reprocess messages even if already recorded (manual use only)"
        required: false
        default: "false"
      message_limit:
        description: "Maximum AgentMail messages to fetch"
        required: false
        default: "50"
      subject_contains:
        description: "Only process messages whose subject contains this text"
        required: false
        default: ""

concurrency:
  group: corte-santo-agent-mail
  cancel-in-progress: false

jobs:
  agent-mail:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore Corte vision cache
        uses: actions/cache@v4
        with:
          path: .cache/corte_santo_vision
          key: corte-santo-vision-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            corte-santo-vision-${{ runner.os }}-

      - name: Install OCR runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-spa

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/dashboard/requirements.txt

      - name: Run Agent Mail stage
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          GOOGLE_DRIVE_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}
          SANTO_CRON_WRITE: "true"
          CORTE_SANTO_AGENTMAIL_LOOKBACK_MINUTES: "300"
          PYTHONUNBUFFERED: "1"
        run: |
          AFTER="${{ github.event.inputs.after }}"
          SUBJECT_CONTAINS="${{ github.event.inputs.subject_contains }}"
          MESSAGE_LIMIT="${{ github.event.inputs.message_limit }}"
          if [ -z "$AFTER" ]; then
            AFTER=$(date -u -d '300 minutes ago' +%Y-%m-%dT%H:%M:%SZ)
          fi
          if [ -z "$MESSAGE_LIMIT" ]; then
            MESSAGE_LIMIT="50"
          fi
          SUBJECT_ARGS=()
          if [ -n "$SUBJECT_CONTAINS" ]; then
            SUBJECT_ARGS=(--subject-contains "$SUBJECT_CONTAINS")
          fi
          python -m services.scheduler.corte_santo_cron \
            --job agent-mail \
            --after "$AFTER" \
            --message-limit "$MESSAGE_LIMIT" \
            --write \
            "${SUBJECT_ARGS[@]}" \
            ${{ github.event.inputs.force_reprocess == 'true' && '--force-reprocess' || '' }}
