name: Analyze CXC Spreadsheet
on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install httpx openpyxl
      - name: Download and analyze
        env:
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          GOOGLE_DRIVE_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}
        run: |
          python -c "
          import httpx, os, json, io
          from openpyxl import load_workbook

          # Get Drive token
          token_resp = httpx.post('https://oauth2.googleapis.com/token', data={
              'client_id': os.environ['GOOGLE_DRIVE_CLIENT_ID'],
              'client_secret': os.environ['GOOGLE_DRIVE_CLIENT_SECRET'],
              'refresh_token': os.environ['GOOGLE_DRIVE_REFRESH_TOKEN'],
              'grant_type': 'refresh_token',
          }, timeout=15)
          access_token = token_resp.json()['access_token']
          headers = {'Authorization': 'Bearer ' + access_token}

          # Download spreadsheet
          file_id = '1mC_WuYqI-eAugkRYbohqbvUSNhYa5BSc'
          resp = httpx.get(
              'https://www.googleapis.com/drive/v3/files/' + file_id,
              params={'alt': 'media'},
              headers=headers,
              timeout=30,
          )
          print('Downloaded:', len(resp.content), 'bytes')

          wb = load_workbook(io.BytesIO(resp.content), data_only=True)
          print('Sheets:', wb.sheetnames)

          for sheet_name in wb.sheetnames:
              ws = wb[sheet_name]
              print('\n=== Sheet: ' + sheet_name + ' ===')
              print('Max row:', ws.max_row, 'Max col:', ws.max_column)

              # Print all rows with data
              for row_idx, row in enumerate(ws.iter_rows(min_row=1, max_row=min(50, ws.max_row), values_only=False), 1):
                  values = []
                  for cell in row:
                      v = cell.value
                      if v is not None:
                          values.append(str(cell.coordinate) + '=' + str(v)[:40])
                  if values:
                      print('  Row ' + str(row_idx) + ': ' + ', '.join(values[:10]))

          wb.close()
          "
