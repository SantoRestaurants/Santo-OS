name: Reprocess Corte
on:
  workflow_dispatch:
    inputs:
      business_date:
        description: "Business date to reprocess (YYYY-MM-DD)"
        required: true
      stage:
        description: "Stage to re-run: agent-mail, bank-watcher, all"
        required: false
        default: "bank-watcher"

jobs:
  reprocess:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore Corte vision cache
        uses: actions/cache@v4
        with:
          path: .cache/corte_santo_vision
          key: corte-santo-vision-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            corte-santo-vision-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/dashboard/requirements.txt

      - name: Run bank-watcher
        if: ${{ inputs.stage == 'bank-watcher' || inputs.stage == 'all' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          GOOGLE_DRIVE_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}
          SANTO_CRON_WRITE: 'true'
        run: |
          python -m services.scheduler.corte_santo_cron \
            --job bank-watcher \
            --business-date ${{ inputs.business_date }}

      - name: Run agent-mail
        if: ${{ inputs.stage == 'agent-mail' || inputs.stage == 'all' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          GOOGLE_DRIVE_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}
          SANTO_CRON_WRITE: 'true'
        run: |
          python -m services.scheduler.corte_santo_cron \
            --job agent-mail
