name: Analyze CXC Image
on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install httpx
      - name: Analyze image
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          GOOGLE_DRIVE_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}
        run: |
          python -c "
          import httpx, os, json, base64

          # Get Drive token
          token_resp = httpx.post('https://oauth2.googleapis.com/token', data={
              'client_id': os.environ['GOOGLE_DRIVE_CLIENT_ID'],
              'client_secret': os.environ['GOOGLE_DRIVE_CLIENT_SECRET'],
              'refresh_token': os.environ['GOOGLE_DRIVE_REFRESH_TOKEN'],
              'grant_type': 'refresh_token',
          }, timeout=15)
          access_token = token_resp.json()['access_token']
          headers = {'Authorization': 'Bearer ' + access_token}

          # Download image
          file_id = '1CnZnqL5rfecDOsAhFCiql32agfDPkAOL'
          resp = httpx.get(
              'https://www.googleapis.com/drive/v3/files/' + file_id,
              params={'alt': 'media'},
              headers=headers,
              timeout=30,
          )
          print('Downloaded image:', len(resp.content), 'bytes')

          # Send to Gemini
          key = os.environ['GEMINI_API_KEY']
          image_b64 = base64.b64encode(resp.content).decode()
          gemini_resp = httpx.post(
              'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent',
              params={'key': key},
              json={
                  'contents': [{
                      'parts': [
                          {'text': 'Analiza esta imagen de un ajuste de CXC (Cuenta por Cobrar). Extrae: 1) Concepto/descripcion, 2) Monto total, 3) Propina (si aplica), 4) Consumo (monto sin propina), 5) A que canal aplica (efectivo, tarjeta, etc), 6) Fecha si esta visible. Responde en JSON con estas keys: concepto, monto_total, propina, consumo, canal, fecha. Si no hay propina, pon propina en 0.'},
                          {'inline_data': {'mime_type': 'image/jpeg', 'data': image_b64}}
                      ]
                  }]
              },
              timeout=30,
          )
          print('Gemini status:', gemini_resp.status_code)
          if gemini_resp.status_code == 200:
              result = gemini_resp.json()
              text = result['candidates'][0]['content']['parts'][0]['text']
              print('Gemini response:')
              print(text)
          else:
              print('Error:', gemini_resp.text[:300])
          "
