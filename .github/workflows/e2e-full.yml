name: E2E Test - Full Pipeline
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx openpyxl

      - name: Get Drive token
        id: drive-token
        env:
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          GOOGLE_DRIVE_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}
        run: |
          TOKEN=$(python -c "
          import httpx, os
          resp = httpx.post('https://oauth2.googleapis.com/token', data={
              'client_id': os.environ['GOOGLE_DRIVE_CLIENT_ID'],
              'client_secret': os.environ['GOOGLE_DRIVE_CLIENT_SECRET'],
              'refresh_token': os.environ['GOOGLE_DRIVE_REFRESH_TOKEN'],
              'grant_type': 'refresh_token',
          }, timeout=15)
          print(resp.json()['access_token'])
          ")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Upload AMEX to Drive
        env:
          DRIVE_TOKEN: ${{ steps.drive-token.outputs.token }}
        run: |
          python -c "
          import httpx, os, io, json
          from openpyxl import Workbook
          wb = Workbook()
          ws = wb.active
          ws.append(['Fecha', 'Descripcion', 'Monto'])
          ws.append(['01/06/2026', 'SPEI RECIBIDO AMEX', 16138.42])
          ws.append(['01/06/2026', 'REST SANTO HAND ROLL', 121558.62])
          buf = io.BytesIO()
          wb.save(buf)
          token = os.environ['DRIVE_TOKEN']
          headers = {'Authorization': 'Bearer ' + token}
          resp = httpx.post(
              'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
              headers=headers,
              files={
                  'metadata': (None, json.dumps({'name': 'AMEX SANTO 030626.xls', 'parents': ['1sN9QP54zdwgprH0-LUJwCVLtd4OY9vsL']}), 'application/json'),
                  'file': ('AMEX SANTO 030626.xls', buf.getvalue(), 'application/vnd.ms-excel'),
              },
              timeout=30,
          )
          print('AMEX:', resp.status_code, resp.json().get('id', resp.text[:200]))
          "

      - name: Upload Banorte to Drive
        env:
          DRIVE_TOKEN: ${{ steps.drive-token.outputs.token }}
        run: |
          python -c "
          import httpx, os, io, csv, json
          buf = io.StringIO()
          writer = csv.writer(buf)
          writer.writerow(['FECHA', 'DESCRIPCION', 'DESCRIPCION DETALLADA', 'DEPOSITOS', 'RETIROS'])
          writer.writerow(['01/06/2026', 'REST SANTO HAND ROLL 08890734C', '-', '121,558.62', '-'])
          writer.writerow(['01/06/2026', 'REST SANTO HAND ROLL 08890734D', '-', '55,864.54', '-'])
          data = buf.getvalue().encode()
          token = os.environ['DRIVE_TOKEN']
          headers = {'Authorization': 'Bearer ' + token}
          resp = httpx.post(
              'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
              headers=headers,
              files={
                  'metadata': (None, json.dumps({'name': 'BANORTE SANTO 030626.csv', 'parents': ['1sN9QP54zdwgprH0-LUJwCVLtd4OY9vsL']}), 'application/json'),
                  'file': ('BANORTE SANTO 030626.csv', data, 'text/csv'),
              },
              timeout=30,
          )
          print('Banorte:', resp.status_code, resp.json().get('id', resp.text[:200]))
          "

      - name: Send email
        env:
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
        run: |
          python -c "
          import base64, httpx, os
          api_key = os.environ['AGENTMAIL_API_KEY']
          data = open('workflows/corte_santo/fixtures/santo_corte_sample.xlsx', 'rb').read()
          attachments = [{'filename': 'SANTO CORTE 03 JUNIO 2026.xlsx', 'content_type': 'application/octet-stream', 'content': base64.b64encode(data).decode()}]
          resp = httpx.post(
              'https://api.agentmail.to/v0/inboxes/santoos@agentmail.to/messages/send',
              headers={'Authorization': 'Bearer ' + api_key, 'Content-Type': 'application/json'},
              json={'to': 'santoos@agentmail.to', 'subject': '[CORTE] SANTO 03 JUNIO 2026 - PRUEBA E2E', 'text': 'Corte de prueba E2E', 'attachments': attachments},
              timeout=60,
          )
          print('Email:', resp.status_code, resp.text[:200])
          "
