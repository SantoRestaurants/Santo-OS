name: E2E Test - Full Pipeline
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx openpyxl

      - name: Run E2E pipeline
        env:
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID: santoos@agentmail.to
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          GOOGLE_DRIVE_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}
          SANTO_CRON_WRITE: 'true'
        run: |
          python -c "
          import base64, httpx, os, json, glob, io, csv
          from pathlib import Path

          # --- Step 1: Get Drive access token ---
          print('=== Step 1: Get Drive access token ===')
          token_resp = httpx.post('https://oauth2.googleapis.com/token', data={
              'client_id': os.environ['GOOGLE_DRIVE_CLIENT_ID'],
              'client_secret': os.environ['GOOGLE_DRIVE_CLIENT_SECRET'],
              'refresh_token': os.environ['GOOGLE_DRIVE_REFRESH_TOKEN'],
              'grant_type': 'refresh_token',
          }, timeout=15)
          access_token = token_resp.json()['access_token']
          headers = {'Authorization': f'Bearer {access_token}'}
          print('Drive token obtained')

          # --- Step 2: Upload bank files to Drive ---
          print('\n=== Step 2: Upload bank files to Drive ===')
          bank_folder = '1sN9QP54zdwgprH0-LUJwCVLtd4OY9vsL'

          # Create AMEX XLS using openpyxl
          from openpyxl import Workbook
          wb = Workbook()
          ws = wb.active
          ws.title = 'AMEX'
          ws.append(['Fecha', 'Descripción', 'Monto'])
          ws.append(['01/06/2026', 'SPEI RECIBIDO AMEX', 16138.42])
          ws.append(['01/06/2026', 'REST SANTO HAND ROLL', 121558.62])
          amex_buf = io.BytesIO()
          wb.save(amex_buf)
          amex_data = amex_buf.getvalue()

          # Upload AMEX
          resp = httpx.post(
              'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
              headers=headers,
              files={
                  'metadata': (None, json.dumps({'name': 'AMEX SANTO 030626.xls', 'parents': [bank_folder]}), 'application/json'),
                  'file': ('AMEX SANTO 030626.xls', amex_data, 'application/vnd.ms-excel'),
              },
              timeout=30,
          )
          print('AMEX upload:', resp.status_code, resp.json().get('id', resp.text[:100]))

          # Create Banorte CSV
          banorte_csv = io.StringIO()
          writer = csv.writer(banorte_csv)
          writer.writerow(['FECHA', 'DESCRIPCIÓN', 'DESCRIPCIÓN DETALLADA', 'DEPÓSITOS', 'RETIROS'])
          writer.writerow(['01/06/2026', 'REST SANTO HAND ROLL 08890734C', '-', '121,558.62', '-'])
          writer.writerow(['01/06/2026', 'REST SANTO HAND ROLL 08890734D', '-', '55,864.54', '-'])
          banorte_data = banorte_csv.getvalue().encode()

          # Upload Banorte
          resp = httpx.post(
              'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
              headers=headers,
              files={
                  'metadata': (None, json.dumps({'name': 'BANORTE SANTO 030626.csv', 'parents': [bank_folder]}), 'application/json'),
                  'file': ('BANORTE SANTO 030626.csv', banorte_data, 'text/csv'),
              },
              timeout=30,
          )
          print('Banorte upload:', resp.status_code, resp.json().get('id', resp.text[:100]))

          # --- Step 3: Send email with attachments ---
          print('\n=== Step 3: Send email ===')
          api_key = os.environ['AGENTMAIL_API_KEY']

          files = {
              'SANTO CORTE 03 JUNIO 2026.xlsx': 'workflows/corte_santo/fixtures/santo_corte_sample.xlsx',
          }
          attachments = []
          for fname, fpath in files.items():
              data = open(fpath, 'rb').read()
              attachments.append({
                  'filename': fname,
                  'content_type': 'application/octet-stream',
                  'content': base64.b64encode(data).decode(),
              })

          resp = httpx.post(
              'https://api.agentmail.to/v0/inboxes/santoos@agentmail.to/messages/send',
              headers={'Authorization': f'Bearer {api_key}', 'Content-Type': 'application/json'},
              json={
                  'to': 'santoos@agentmail.to',
                  'subject': '[CORTE] SANTO 03 JUNIO 2026 - PRUEBA E2E',
                  'text': 'Corte de prueba E2E - 03 junio 2026',
                  'attachments': attachments,
              },
              timeout=60,
          )
          print('Email sent:', resp.status_code, resp.text[:200])

          print('\n=== Done! Trigger agent-mail and bank-watcher workflows next ===')
          "
