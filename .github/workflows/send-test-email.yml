name: Send Test Email
on:
  workflow_dispatch:
    inputs:
      from_address:
        description: 'From address'
        default: 'dantecastelaou@gmail.com'
        required: false

jobs:
  send-email:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx

      - name: Send email
        env:
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
        run: |
          python -c "
          import base64, httpx, os, glob, json

          api_key = os.environ['AGENTMAIL_API_KEY']
          fixtures_dir = 'workflows/corte_santo/tests/fixtures'

          files = {}
          for ext in ['*.xlsx']:
              for f in glob.glob(os.path.join(fixtures_dir, ext)):
                  files[os.path.basename(f)] = f

          attachments = []
          for fname, fpath in files.items():
              data = open(fpath, 'rb').read()
              attachments.append({
                  'filename': fname,
                  'content_type': 'application/octet-stream',
                  'content': base64.b64encode(data).decode(),
              })

          # Add placeholder images if they exist
          for img_pattern in ['*.jpeg', '*.jpg', '*.png']:
              for f in glob.glob(os.path.join(fixtures_dir, img_pattern)):
                  fname = os.path.basename(f)
                  data = open(f, 'rb').read()
                  attachments.append({
                      'filename': fname,
                      'content_type': 'image/jpeg',
                      'content': base64.b64encode(data).decode(),
                  })

          resp = httpx.post(
              'https://api.agentmail.to/v0/inboxes/santoos@agentmail.to/messages/send',
              headers={'Authorization': f'Bearer {api_key}', 'Content-Type': 'application/json'},
              json={
                  'to': 'santoos@agentmail.to',
                  'subject': '[CORTE] SANTO 03 JUNIO 2026 - PRUEBA E2E',
                  'text': 'Corte de prueba E2E - 03 junio 2026',
                  'attachments': attachments,
              },
              timeout=60,
          )
          print('Status:', resp.status_code)
          print('Response:', resp.text[:500])
          "
